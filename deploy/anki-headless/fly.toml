# Fly.io app config for the headless Anki + AnkiConnect instance.
#
# Builds from the Dockerfile in this directory (extends the prebuilt
# `ankimcp/headless-anki` image with a socat relay — see Dockerfile/
# entrypoint.sh) as its own Fly app, logged into Dylan's real AnkiWeb account
# via a one-time manual VNC step (documented in AGENTS.md — the loop must
# never perform that step itself). Like backend/frontend, this must be
# deployed from *inside* `deploy/anki-headless/`, not the repo root with
# `--config` — see AGENTS.md.
#
# The backend reaches AnkiConnect via Flycast (`anki-ai-cards-anki.flycast`,
# dialed on port 80 — Flycast is itself a proxy that always listens on the
# external port 80/443 and forwards to this file's `internal_port` from
# there, same as Fly's public proxy; dialing `internal_port` directly from
# the caller bypasses the proxy and just gets a connection reset ~3s later —
# see AGENTS.md's "Headless Anki deployment" point 4 for the full story of
# how long that went undiagnosed), NOT raw 6PN (`.internal`) — AnkiConnect's
# underlying web server is IPv4-only (its `webBindAddress` config must stay
# `0.0.0.0`; it fails to even start listening if given an IPv6 address like
# `::`), but 6PN direct machine-to-machine connections are IPv6-only. As a
# defensive measure against AnkiConnect's hand-rolled, single-threaded socket
# server (see AGENTS.md point 2), a socat relay (port 8766, this file's
# `internal_port` — the port Flycast forwards *to*, never what a caller
# dials) sits in front of it: Flycast talks to the relay, and the relay
# forwards to AnkiConnect over genuine 127.0.0.1:8765 loopback.
#
# The `[http_service]` block is required for Flycast to work at all, but does
# NOT make AnkiConnect publicly reachable by itself — that only happens if
# the app also has a public IP allocated (`fly ips list -a anki-ai-cards-anki`
# should show none; `fly ips release <addr>` if one ever appears). See
# AGENTS.md's "Headless Anki deployment" section for the full one-time setup
# (Flycast IP allocation, etc).
#
# The `anki_data` volume must exist before the first deploy — it is NOT
# created automatically from this file. See README.md's deploy section for
# the `fly volumes create ... --size` command (10GB is comfortable for up to
# ~10,000 notes with audio/images). Fly volumes can be extended
# (`fly volumes extend`) later but never shrunk, so size generously.
#
# See AGENTS.md's "Autonomous deploy/debug access" for who/what may run
# `fly deploy` against this app.

app = 'anki-ai-cards-anki'
primary_region = 'iad'

[build]

[[mounts]]
  source = 'anki_data'
  destination = '/data'

[http_service]
  internal_port = 8766
  force_https = false
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
