# Fly.io app config for the headless Anki + AnkiConnect instance.
#
# This runs the prebuilt `ankimcp/headless-anki` image (no code from this
# repo) as its own Fly app, logged into Dylan's real AnkiWeb account via a
# one-time manual VNC step (documented in AGENTS.md — the loop must never
# perform that step itself).
#
# The backend reaches AnkiConnect via Flycast (`anki-ai-cards-anki.flycast`),
# NOT raw 6PN (`.internal`) — AnkiConnect's underlying web server is IPv4-only
# (its `webBindAddress` config must stay `0.0.0.0`; it fails to even start
# listening if given an IPv6 address like `::`), but 6PN direct machine-to-
# machine connections are IPv6-only. Flycast routes through Fly's own proxy
# instead, which — like the public proxy — reaches the app over IPv4
# internally, so it works with an IPv4-only listener. The `[http_service]`
# below is required for Flycast to work at all, but does NOT make AnkiConnect
# publicly reachable by itself — that only happens if the app also has a
# public IP allocated (`fly ips list -a anki-ai-cards-anki` should show none;
# `fly ips release <addr>` if one ever appears). See AGENTS.md's "Headless
# Anki deployment" section for the full one-time setup (Flycast IP
# allocation, etc).
#
# The `anki_data` volume must exist before the first deploy — it is NOT
# created automatically from this file. See README.md's deploy section for
# the `fly volumes create ... --size` command (10GB is comfortable for up to
# ~10,000 notes with audio/images). Fly volumes can be extended
# (`fly volumes extend`) later but never shrunk, so size generously.
#
# Deploying this is a manual step for Dylan (`fly deploy --config
# deploy/anki-headless/fly.toml`) — the loop must never run `fly deploy`.

app = 'anki-ai-cards-anki'
primary_region = 'iad'

[build]
  image = 'ghcr.io/ankimcp/headless-anki:x11-vnc-v1.0.0'

[[mounts]]
  source = 'anki_data'
  destination = '/data'

[http_service]
  internal_port = 8765
  force_https = false
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
