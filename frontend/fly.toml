# Fly.io app config for the Next.js frontend (PRD task 12). Builds from the
# Dockerfile in this directory. Deploying this must be run from *inside*
# `frontend/` (`cd frontend && fly deploy`) — Fly uses the current working
# directory as the build context, and this Dockerfile's COPY paths are
# relative to this directory. This is a manual step for Dylan — the loop
# must never run it.

app = 'anki-ai-cards-frontend'
primary_region = 'iad'

[build]
  # BACKEND_URL must be passed as a build ARG, not just a runtime [env] var:
  # next.config.ts reads it at `next build` time to bake the rewrites()
  # destination into the routes manifest — see frontend/Dockerfile's comment
  # and next.config.ts. The [env] entry below is what the running container
  # sees at runtime; this is what `next build` sees while building the image.
  [build.args]
    BACKEND_URL = "http://anki-ai-cards-backend.internal:8000"

[env]
  BACKEND_URL = 'http://anki-ai-cards-backend.internal:8000'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
