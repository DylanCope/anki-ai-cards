# Fly.io app config for the FastAPI backend (PRD task 12). Builds from the
# Dockerfile in this directory. Deploying this must be run from *inside*
# `backend/` (`cd backend && fly deploy`) — Fly uses the current working
# directory as the build context, and this Dockerfile's COPY paths are
# relative to this directory. Running `fly deploy --config backend/fly.toml`
# from elsewhere fails with "app does not have a Dockerfile or buildpacks
# configured." This is a manual step for Dylan — the loop must never run it.
#
# Secrets are NOT set here (fly.toml is not a secret store) — they must be
# pushed once via `fly secrets set -a anki-ai-cards-backend KEY=value` before
# the first deploy:
#   ANTHROPIC_API_KEY, ELEVENLABS_API_KEY, GOOGLE_CLIENT_ID,
#   GOOGLE_CLIENT_SECRET, ALLOWED_EMAIL, SESSION_SECRET_KEY
# The [env] block below only holds non-secret configuration.

app = 'anki-ai-cards-backend'
primary_region = 'iad'

[build]

[env]
  # Reaches the headless Anki app (deploy/anki-headless/fly.toml) over Fly's
  # private 6PN network — no public URL, no VNC/AnkiConnect port exposed.
  ANKICONNECT_URL = 'http://anki-ai-cards-anki.internal:8765'
  # SQLite file lives on the persistent volume mounted below.
  DATABASE_PATH = '/data/anki-ai-cards.db'

[[mounts]]
  source = 'backend_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
